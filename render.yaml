services:
  - type: web
    name: kairan
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: ./bin/start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kairan-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info

databases:
  - name: kairan-db
    databaseName: kairan
    plan: free
