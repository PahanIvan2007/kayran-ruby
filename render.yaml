services:
  - type: web
    name: kairan
    runtime: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: kairan-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_LEVEL
        value: info

databases:
  - name: kairan-db
    databaseName: kairan
    plan: free
